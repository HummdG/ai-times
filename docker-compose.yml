services:
  postgres:
    image: postgres:17-alpine
    container_name: aitimes-db
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-aitimes}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-aitimes}
      POSTGRES_DB: ${POSTGRES_DB:-aitimes}
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:

